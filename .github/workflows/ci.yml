name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint (JS · HTML · CSS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint JavaScript (ESLint)
        run: npm run lint -- --format=compact

      - name: Lint HTML (HTMLHint)
        run: npm run lint:html

      - name: Lint CSS (Stylelint)
        run: npm run lint:css

  # ── 2. Unit tests ──────────────────────────────────────────────────────────
  test:
    name: Unit Tests (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore
          retention-days: 7

  # ── 3. Live smoke test (main branch only) ─────────────────────────────────
  smoke:
    name: Smoke test — dgiry.github.io/secprior
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [lint, test]
    steps:
      - name: Wait for GitHub Pages to propagate
        run: sleep 60

      - name: Check live deployment responds HTTP 200
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            https://dgiry.github.io/secprior/)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Deployment check failed — got HTTP $STATUS"
            exit 1
          fi
          echo "✅ Live deployment OK"
